---
name: Build Fedora toolbox images
on:
  push:
    branches:
      - main
    paths:
      - 'fedora/*-toolbox/**'
      - '!fedora/**/README.md'
      - '.github/workflows/build-fedora-toolbox.yml'
  workflow_dispatch:
  schedule:
    - cron: '35 4 * * 6' # Every Saturday at 04:35am
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      matrix:
        version: ['44-toolbox']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Extract Fedora release version
        id: version
        shell: bash
        run: echo "release=${VERSION%-toolbox}" >> $GITHUB_OUTPUT
        env:
          VERSION: ${{ matrix.version }}

      - name: Build and push image
        uses: ./.github/actions/build-image
        with:
          name: fedora
          version: ${{ matrix.version }}
          description: Custom Fedora ${{ steps.version.outputs.release }} toolbox container image
          build-context: ./fedora/${{ matrix.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
