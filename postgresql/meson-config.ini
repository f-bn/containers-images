[built-in options]
prefix = '/usr'
bindir = '/usr/bin'
libdir = '/usr/lib/postgresql'
includedir = '/usr/include/postgresql'
datadir = '/usr/share/postgresql'
sysconfdir = '/etc'
c_link_args = ['-Wl,-rpath,/usr/lib/postgresql']
auto_features = 'disabled'
buildtype = 'release'

[project options]
nls = 'enabled'
icu = 'enabled'
llvm = 'enabled'
lz4 = 'enabled'
zstd = 'enabled'
ssl = 'openssl'
uuid = 'e2fs'
systemd = 'enabled'
readline = 'enabled'
zlib = 'enabled'